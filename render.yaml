services:
  - type: web
    name: jira-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server -b 0.0.0.0:$PORT --workers 1 --timeout 180
    envVars:
      - key: JIRA_BASE_URL
        value: https://solytics.atlassian.net
      - key: JIRA_EMAIL
        sync: false
      - key: JIRA_API_TOKEN
        sync: false
      - key: JIRA_PROJECT
        value: NNG
      - key: MAX_ISSUES
        value: "500"
      - key: DAYS_BACK
        value: "180"
      - key: MAX_CHANGELOG
        value: "30"
      - key: DASH_USER
        sync: false
      - key: DASH_PASS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: ENABLE_MANUAL_TRAIN
        value: "false"
